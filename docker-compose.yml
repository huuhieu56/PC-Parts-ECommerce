services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: pc-shop-backend:latest
    container_name: pc-shop-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://localhost:5432/pc_shop_database}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-your_username}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-your_password}
      SERVER_PORT: ${SERVER_PORT:-8080}
      APP_CORS_ALLOWED_ORIGINS: "${APP_CORS_ALLOWED_ORIGINS:-*}"
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/images

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    image: pc-shop-frontend:latest
    container_name: pc-shop-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    environment:
      - NODE_ENV=production

volumes:
  backend_uploads:
    driver: local
