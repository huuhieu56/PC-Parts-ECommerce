# =============================================================================
# PC Parts E-Commerce — Production Docker Compose
# =============================================================================
# This file is used by GitHub Actions deploy workflow.
# All env vars are injected from .env (created by CI/CD pipeline).
# =============================================================================

services:
  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: pcparts-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - pcparts-net
    restart: unless-stopped

  # --- Frontend (Next.js) ---
  frontend:
    image: ${FRONTEND_IMAGE:-pcparts-frontend:latest}
    container_name: pcparts-frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      - NEXT_PUBLIC_MINIO_URL=${NEXT_PUBLIC_MINIO_URL:-http://localhost:9000}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pcparts-net
    restart: unless-stopped

  # --- Backend (Spring Boot) ---
  backend:
    image: ${BACKEND_IMAGE:-pcparts-backend:latest}
    container_name: pcparts-backend
    expose:
      - "8080"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/pcparts}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-pcparts}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-pcparts_secret_2026}
      - SPRING_DATA_REDIS_HOST=${SPRING_REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${SPRING_REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${SPRING_REDIS_PASSWORD:-redis_secret_2026}
      - JWT_SECRET=${JWT_SECRET:-Q09OhlkoVLpsdYr95wOTjqHsB67JvNv9ncEkPsHta3g=}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-900000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-2592000000}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minio_secret_2026}
      - MINIO_BUCKET=${MINIO_BUCKET:-pcparts}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - pcparts-net
    restart: unless-stopped

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: pcparts-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-pcparts}
      - POSTGRES_USER=${POSTGRES_USER:-pcparts}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pcparts_secret_2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pcparts} -d ${POSTGRES_DB:-pcparts}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pcparts-net
    restart: unless-stopped

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: pcparts-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_2026}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pcparts-net
    restart: unless-stopped

  # --- MinIO (S3-compatible file storage) ---
  minio:
    image: minio/minio
    container_name: pcparts-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio_secret_2026}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    networks:
      - pcparts-net
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local

networks:
  pcparts-net:
    driver: bridge
