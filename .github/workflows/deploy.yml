# =============================================================================
# PC Parts E-Commerce — Auto Deploy on main push
# =============================================================================
# Flow: Build Docker images → Save as .tar.gz → SCP to server → Load & Run
#
# Required GitHub Secrets & Variables:
#   Secrets:
#     - SERVER_HOST          : IP hoặc hostname server
#     - SERVER_USERNAME      : SSH username
#     - SERVER_SSH_KEY       : SSH private key (nội dung file id_ed25519)
#     - SERVER_SSH_PORT      : SSH port (vd: 22)
#     - APP_FRONTEND_URL     : URL frontend public cho email reset password (vd: https://domain.com)
#     - NEXT_PUBLIC_API_URL  : URL API cho frontend (vd: https://domain.com/api/v1)
#     - NEXT_PUBLIC_MINIO_URL: URL MinIO public (vd: https://domain.com:9000)
#   Variables:
#     - DEPLOY_PATH          : Thư mục deploy trên server (vd: /opt/pcparts)
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]

  # Cho phép chạy tay từ Actions tab
  workflow_dispatch:

jobs:
  # =========================================================================
  # Job 1: Build Docker images, save as tar, upload as artifact
  # =========================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    environment: PRODUCTION

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: pcparts-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: pcparts-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_MINIO_URL=${{ secrets.NEXT_PUBLIC_MINIO_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Save images as tar.gz
        run: |
          docker save pcparts-backend:latest | gzip > pcparts-backend.tar.gz
          docker save pcparts-frontend:latest | gzip > pcparts-frontend.tar.gz
          ls -lh *.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            pcparts-backend.tar.gz
            pcparts-frontend.tar.gz
          retention-days: 1

  # =========================================================================
  # Job 2: Transfer images to server and deploy
  # =========================================================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build]
    environment: PRODUCTION

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: ./images

      - name: Create deploy directory on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            mkdir -p ${{ secrets.DEPLOY_PATH || '/opt/pcparts' }}

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "images/pcparts-backend.tar.gz,images/pcparts-frontend.tar.gz,docker-compose.prod.yml,nginx/"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0
          overwrite: true

      - name: Load images and start services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            set -e

            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY_DIR"

            echo "=== Creating .env file ==="
            cat > .env << 'EOF'
            APP_FRONTEND_URL=${{ secrets.APP_FRONTEND_URL || format('http://{0}', secrets.SERVER_HOST) }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_MINIO_URL=${{ secrets.NEXT_PUBLIC_MINIO_URL }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            EOF

            echo "=== Loading Docker images ==="
            docker load -i images/pcparts-backend.tar.gz
            docker load -i images/pcparts-frontend.tar.gz

            echo "=== Starting services ==="
            export MINIO_PUBLIC_URL="${{ secrets.NEXT_PUBLIC_MINIO_URL }}"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "=== Cleaning up tar files ==="
            rm -rf images/

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Verifying services ==="
            sleep 10
            docker compose -f docker-compose.prod.yml ps

            echo "=== Deploy completed successfully ==="
